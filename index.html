<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PawHaven Veterinary Clinic — compassionate, modern care for your best friend. Book appointments, explore services, and shop pet essentials."
    />
    <meta name="theme-color" content="#0f766e" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent theme flash: apply stored/system theme before first paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("pawhaven-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = stored ? stored === "dark" : false;
          if (stored === "system" || (!stored && prefersDark)) isDark = prefersDark;
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>

    <title>PawHaven · Compassionate Veterinary Care</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
